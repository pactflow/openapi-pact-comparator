openapi: 3.1.0
info:
  title: OAS
  version: 1.0.0

paths:
  /payment:
    post:
      responses:
        "200":
          description: OK
          content:
            "application/json":
              schema:
                type: object
                required:
                  - method
                properties:
                  method:
                    type: string
                    enum: [card, paypal]
                  cardNumber:
                    type: string
                  paypalEmail:
                    type: string
                    format: email
                if:
                  properties:
                    method:
                      const: card
                then:
                  required:
                    - cardNumber
                else:
                  required:
                    - paypalEmail
