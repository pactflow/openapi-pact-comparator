asyncapi: "3.1.0"
info:
  title: Order Service
  version: "1.0.0"
channels:
  requests:
    address: order-requests
    messages:
      OrderRequest:
        messageId: OrderRequest
        payload:
          type: object
          properties:
            orderId:
              type: string
          required:
            - orderId
  replies:
    address: order-replies
    messages:
      OrderResponse:
        messageId: OrderResponse
        payload:
          type: object
          properties:
            status:
              type: string
operations:
  sendOrder:
    action: send
    channel:
      $ref: "#/channels/requests"
    messages:
      - $ref: "#/channels/requests/messages/OrderRequest"
    reply:
      channel:
        $ref: "#/channels/replies"
      messages:
        - $ref: "#/channels/replies/messages/OrderResponse"
